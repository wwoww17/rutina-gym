  .badge-machine{color:#888;font-size:10px;font-family:'Barlow',sans-serif}
  .ex-name{font-size:15px;font-weight:700;letter-spacing:.4px;line-height:1.3}
  .ex-right{text-align:right;flex-shrink:0}
  .ex-sets{font-size:18px;font-weight:900}
  .ex-rest{font-size:10px;color:#555;font-family:'Barlow',sans-serif}
  .ex-detail{padding:0 16px 14px;padding-top:12px;display:none}

  .ex-note{font-family:'Barlow',sans-serif;font-size:13px;color:#aaa;line-height:1.6;margin-bottom:12px}
  .guide-btn{cursor:pointer;border:none;padding:6px 12px;border-radius:4px;font-family:'Barlow',sans-serif;font-size:11px;font-weight:600;letter-spacing:1px;transition:all .15s}

  plancha_frontal:`<svg viewBox="0 0 200 160" width="100%" height="140"><rect x="20" y="120" width="160" height="4" fill="#444" rx="1"/><rect x="46" y="105" width="110" height="14" fill="#D4956A" rx="5"/><circle cx="160" cy="108" r="9" fill="#D4956A"/><rect x="46" y="116" width="16" height="5" fill="#D4956A" rx="2"/><rect x="76" y="116" width="16" height="5" fill="#D4956A" rx="2"/><ellipse cx="38" cy="116" rx="8" ry="5" fill="#D4956A"/><rect x="86" y="105" width="40" height="14" fill="COL" rx="4" opacity=".15" style="animation:pf-breathe 3s ease-in-out infinite"/><text x="100" y="12" text-anchor="middle" fill="COL" font-size="8" font-family="sans-serif" style="animation:pf-breathe 3s ease-in-out infinite">● CORE ACTIVO</text><line x1="38" y1="108" x2="160" y2="108" stroke="COL" stroke-width="1" stroke-dasharray="4,3" opacity=".4"/><text x="100" y="155" text-anchor="middle" fill="#666" font-size="9" font-family="sans-serif">LÍNEA RECTA CABEZA-TALONES</text></svg>`,
};

let currentDay = 0;
let openCard = null;
let openGuide = null;

function getSVG(key, color) {
  return (SVG_DATA[key] || '').replace(/COL/g, color);
}

function buildDay(dayIdx) {
  const d = DAYS[dayIdx];
  const container = document.getElementById('day-' + dayIdx);
  if (container.innerHTML !== '') return;

  let html = '';
  d.exercises.forEach((ex, i) => {
    const cardId = `card-${dayIdx}-${i}`;
    const detailId = `detail-${dayIdx}-${i}`;
    const guideId = `guide-${dayIdx}-${i}`;
    const borderId = `border-${dayIdx}-${i}`;

    let badges = '';
    if (ex.superset) badges += `<span class="badge-superset">SUPERSET</span>`;
    if (ex.warning) badges += `<span class="badge-warning">⚠️ LUMBAR</span>`;
    badges += `<span class="badge-tag" style="background:${d.color}18;color:${d.color};border:1px solid ${d.color}33">${ex.tag}</span>`;
    if (ex.machine) badges += `<span class="badge-machine">⚙️ Máquina</span>`;

    const kpDots = ex.kp.map((pt, pi) => {
      const dotColor = pi === 0 ? d.color : pi === 1 ? d.color + '88' : '#333';
      const textColor = pi === 0 ? '#ddd' : '#999';
      return `<div class="kp-row"><div class="kp-dot" style="background:${dotColor}"></div><div class="kp-text" style="color:${textColor}">${pt}</div></div>`;
    }).join('');

    html += `
    <div class="ex-card" id="${borderId}">
      <div class="ex-row" onclick="toggleCard(${dayIdx},${i})">
        <div style="flex:1">
          <div class="ex-badges">${badges}</div>
          <div class="ex-name">${ex.name}</div>
        </div>
        <div class="ex-right">
          <div class="ex-sets" style="color:${d.color}">${ex.sets}</div>
          <div class="ex-rest">descanso ${ex.rest}</div>
        </div>
      </div>
      <div class="ex-detail" id="${detailId}" style="border-top:1px solid ${d.color}20">
        <p class="ex-note">📝 ${ex.note}</p>
        <button class="guide-btn" id="gbtn-${dayIdx}-${i}"
          style="background:${d.color}22;color:${d.color};border:1px solid ${d.color}55"
          onclick="toggleGuide(event,${dayIdx},${i})">▶ VER GUÍA VISUAL</button>
      </div>
      <div class="guide-panel" id="${guideId}" style="border-top:1px solid ${d.color}30">
        <div class="guide-svg-wrap" style="background:linear-gradient(180deg,${d.color}08 0%,transparent 100%)">
          <div class="guide-svg-lbl" style="color:${d.color}">ILUSTRACIÓN ANIMADA</div>
          ${getSVG(ex.svg, d.color)}
        </div>
        <div class="guide-kp">
          <div class="guide-kp-lbl" style="color:${d.color}">PUNTOS CLAVE</div>
          ${kpDots}
        </div>
      </div>
    </div>`;
  });
  container.innerHTML = html;
}

function toggleCard(dayIdx, exIdx) {
  const detailId = `detail-${dayIdx}-${exIdx}`;
  const guideId = `guide-${dayIdx}-${exIdx}`;
  const borderId = `border-${dayIdx}-${exIdx}`;
  const d = DAYS[dayIdx];

  if (openCard && openCard !== `${dayIdx}-${exIdx}`) {
    const [od, oi] = openCard.split('-');
    document.getElementById(`detail-${od}-${oi}`).classList.remove('open');
    document.getElementById(`guide-${od}-${oi}`).classList.remove('open');
    document.getElementById(`border-${od}-${oi}`).style.borderColor = '';
    resetGuideBtn(od, oi, DAYS[od].color);
    openGuide = null;
  }

  const detail = document.getElementById(detailId);
  const isOpen = detail.classList.contains('open');
  detail.classList.toggle('open');
  document.getElementById(borderId).style.borderColor = isOpen ? '' : d.color + '55';
  if (isOpen) {
    document.getElementById(guideId).classList.remove('open');
    resetGuideBtn(dayIdx, exIdx, d.color);
    openGuide = null;
    openCard = null;
  } else {
    openCard = `${dayIdx}-${exIdx}`;
  }
}

function toggleGuide(e, dayIdx, exIdx) {
  e.stopPropagation();
  const guideId = `guide-${dayIdx}-${exIdx}`;
  const btn = document.getElementById(`gbtn-${dayIdx}-${exIdx}`);
  const d = DAYS[dayIdx];
  const guide = document.getElementById(guideId);
  const isOpen = guide.classList.contains('open');
  guide.classList.toggle('open');
  if (isOpen) {
    btn.style.background = d.color + '22';
    btn.style.color = d.color;
    btn.textContent = '▶ VER GUÍA VISUAL';
    openGuide = null;
  } else {
    btn.style.background = d.color;
    btn.style.color = '#000';
    btn.textContent = '✕ CERRAR GUÍA';
    openGuide = `${dayIdx}-${exIdx}`;
  }
}

function resetGuideBtn(dayIdx, exIdx, color) {
  const btn = document.getElementById(`gbtn-${dayIdx}-${exIdx}`);
  if (btn) {
    btn.style.background = color + '22';
    btn.style.color = color;
    btn.textContent = '▶ VER GUÍA VISUAL';
  }
}

function switchDay(idx) {
  const colors = ["#00E5FF","#76FF03","#FF6D00"];
  // Close open cards
  if (openCard) {
    const [od, oi] = openCard.split('-');
    const detail = document.getElementById(`detail-${od}-${oi}`);
    if (detail) detail.classList.remove('open');
    const guide = document.getElementById(`guide-${od}-${oi}`);
    if (guide) guide.classList.remove('open');
    const border = document.getElementById(`border-${od}-${oi}`);
    if (border) border.style.borderColor = '';
    openCard = null; openGuide = null;
  }

  // Update tabs
  document.querySelectorAll('.day-btn').forEach((b,i) => {
    b.classList.toggle('active', i === idx);
    b.style.borderColor = i === idx ? colors[i] : 'transparent';
    document.getElementById(`lbl-${i}`).style.color = i === idx ? colors[i] : '#f0f0f0';
  });

  // Update title color
  document.getElementById('title-color').style.color = colors[idx];

  // Update stats
  const d = DAYS[idx];
  const supersets = d.exercises.filter(e => e.superset).length;
  document.getElementById('stats').innerHTML = `
    <div class="stat-box"><div class="stat-val" style="color:${d.color}">${d.exercises.length}</div><div class="stat-lbl">EJERCICIOS</div></div>
    <div class="stat-box"><div class="stat-val" style="color:${d.color}">~60</div><div class="stat-lbl">MINUTOS</div></div>
    <div class="stat-box"><div class="stat-val" style="color:${d.color}">${supersets}</div><div class="stat-lbl">SUPERSETS</div></div>
  `;

  // Warmup
  document.getElementById('warmup-bar').style.background = d.color + '12';
  document.getElementById('warmup-bar').style.border = `1px solid ${d.color}30`;
  document.getElementById('warmup-lbl').style.color = d.color;
  document.getElementById('warmup-text').textContent = d.warmup;

  // Tips accent
  document.getElementById('tips-accent').style.background = d.color;

  // Show day
  document.querySelectorAll('.day-content').forEach((el,i) => el.classList.toggle('active', i === idx));
  buildDay(idx);

  currentDay = idx;
}

// Build tips
const tipsList = document.getElementById('tips-list');
TIPS.forEach(t => {
  const el = document.createElement('div');
  el.className = 'tip-card';
  el.innerHTML = `<span style="font-size:16px;flex-shrink:0">${t.icon}</span><span>${t.text}</span>`;
  tipsList.appendChild(el);
});

// Init
switchDay(0);
</script>
</body>
</html>
